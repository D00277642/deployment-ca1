stages:
  - build

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - when: never

build_and_push_images:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - test -n "$DOCKERHUB_USERNAME"
    - test -n "$DOCKERHUB_TOKEN"
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - docker build -t "$DOCKERHUB_USERNAME/catalog:$CI_COMMIT_TAG" ./catalog-svc
    - docker build -t "$DOCKERHUB_USERNAME/product-admin:$CI_COMMIT_TAG" ./product-admin-svc
    - docker build -t "$DOCKERHUB_USERNAME/shop-front:$CI_COMMIT_TAG" ./shop-front-svc
    - docker push "$DOCKERHUB_USERNAME/catalog:$CI_COMMIT_TAG"
    - docker push "$DOCKERHUB_USERNAME/product-admin:$CI_COMMIT_TAG"
    - docker push "$DOCKERHUB_USERNAME/shop-front:$CI_COMMIT_TAG"
  rules:
    - if: '$CI_COMMIT_TAG'
