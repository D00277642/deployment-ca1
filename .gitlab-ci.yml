stages:
  - build

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'

build_and_push_images:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:latest
    entrypoint: [""]
  script:
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"username\":\"$DOCKERHUB_USERNAME\",\"password\":\"$DOCKERHUB_TOKEN\"}}}" > /kaniko/.docker/config.json

    - /kaniko/executor --context catalog-svc --dockerfile catalog-svc/Dockerfile --destination $DOCKERHUB_USERNAME/catalog:$CI_COMMIT_TAG
    - /kaniko/executor --context product-admin-svc --dockerfile product-admin-svc/Dockerfile --destination $DOCKERHUB_USERNAME/product-admin:$CI_COMMIT_TAG
    - /kaniko/executor --context shop-front-svc --dockerfile shop-front-svc/Dockerfile --destination $DOCKERHUB_USERNAME/shop-front:$CI_COMMIT_TAG
